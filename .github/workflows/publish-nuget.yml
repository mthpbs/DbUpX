name: Publish NuGet Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (for example: 2.1.0 or v2.1.0)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NUGET_SOURCE: https://api.nuget.org/v3/index.json
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version from tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ -z "$INPUT_VERSION" ]]; then
              echo "Manual runs require the 'version' input."
              exit 1
            fi
            version="${INPUT_VERSION#v}"
          else
            ref="${GITHUB_REF_NAME}"
            if [[ ! "$ref" =~ ^v([0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?)$ ]]; then
              echo "Tag '$ref' is not valid. Expected format: vX.Y.Z or vX.Y.Z-suffix"
              exit 1
            fi
            version="${ref#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version '$version' is not valid. Expected format: X.Y.Z or X.Y.Z-suffix"
            exit 1
          fi

          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"
          echo "Resolved package version: $version"

      - name: Restore
        run: dotnet restore DbUpX.sln

      - name: Build
        run: dotnet build DbUpX.sln -c Release --no-restore

      - name: Test (exclude integration)
        run: dotnet test DbUpX.Tests/DbUpX.Tests.csproj -c Release --no-build --filter "FullyQualifiedName!~IntegrationTests"

      - name: Pack
        run: dotnet pack DbUpX/DbUpX.csproj -c Release --no-build -o ./artifacts /p:PackageVersion=${{ env.PACKAGE_VERSION }}

      - name: NuGet login (OIDC)
        id: nuget_login
        if: ${{ secrets.NUGET_USER != '' }}
        uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push package to NuGet.org
        env:
          NUGET_PUBLISH_API_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY || secrets.NUGET_API_KEY }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ env.NUGET_PUBLISH_API_KEY }}" --source "${{ env.NUGET_SOURCE }}" --skip-duplicate
